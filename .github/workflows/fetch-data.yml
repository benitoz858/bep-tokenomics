name: Fetch Pricing Data
on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Fetch OpenRouter token pricing
        run: npx tsx scripts/fetch-openrouter.ts
      - name: Fetch GPU rental pricing
        run: npx tsx scripts/fetch-gpu-pricing.ts
        env:
          GETDEPLOYING_API_KEY: ${{ secrets.GETDEPLOYING_API_KEY }}
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
      - name: Compute indices
        run: npx tsx scripts/compute-indices.ts
      - name: Commit updated data
        run: |
          git config user.name "BEP Data Bot"
          git config user.email "bot@bepresearch.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date +%Y-%m-%d) pricing update"
          git push
